<!DOCTYPE html>
<html lang='en'>
    <head>
        <meta charset='UTF-8' />
        <meta name='viewport' content='width=device-width, initial-scale=1.0, viewport-fit=cover' />
        <meta name='theme-color' content='#8b5cf6' />
        <meta name='theme-color' media='(prefers-color-scheme: light)' content='#8b5cf6' />
        <meta name='theme-color' media='(prefers-color-scheme: dark)' content='#7c3aed' />
        <meta name='description' content='Production Management App - Track production data, manage machines, operators, and products' />
        <meta name='mobile-web-app-capable' content='yes' />
        <meta name='apple-mobile-web-app-capable' content='yes' />
        <meta name='apple-mobile-web-app-status-bar-style' content='black-translucent' />
        <meta name='apple-mobile-web-app-title' content='Production Manager' />
        
        <title>Production Management App</title>
        
        <!-- PWA Manifest -->
        <link rel='manifest' href='/manifest.json' />
        
        <!-- App Icons -->
        <link rel='icon' type='image/png' sizes='192x192' href='/assets/generated/app-icon-transparent.dim_192x192.png' />
        <link rel='icon' type='image/png' sizes='512x512' href='/assets/generated/app-icon-transparent.dim_512x512.png' />
        <link rel='apple-touch-icon' href='/assets/generated/app-icon-transparent.dim_192x192.png' />
        
        <!-- Splash Screen -->
        <link rel='apple-touch-startup-image' href='/assets/generated/splash-background.dim_1080x1920.png' />
    </head>
    <body>
        <div id='root'></div>
        <script type='module' src='/src/main.tsx'></script>
        <script>
            // Register service worker for PWA
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register('/sw.js')
                        .then(registration => {
                            console.log('Service Worker registered:', registration);
                        })
                        .catch(error => {
                            console.log('Service Worker registration failed:', error);
                        });
                });
            }
        </script>
    </body>
</html>
